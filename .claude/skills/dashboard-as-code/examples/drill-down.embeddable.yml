# Example: drill-down between two embeddables
# Demonstrates:
# - DRILLDOWN action on a chart event
# - variableOverrides with `sourceType: EVENT_PROPERTY` (the clicked dimension value)
# - variableOverrides with `sourceType: VARIABLE` (preserve a parent filter)
# - Two embeddables in one file: source (`orders-by-country`) and target (`orders-detail-by-country`)
#   The target could equally live in a separate `*.embeddable.yml` file under
#   `src/embeddable.com/embeddables/` — the cross-file reference works either way.

embeddables:
  # ----- Source embeddable: clicked from to drill into detail -----
  - name: orders-by-country
    title: Orders by country
    description: Top-level chart that drills into per-country detail when bars are clicked.
    variables:
      - name: date-range
        type: timeRange
        defaultValue: { relativeTimeString: 'Last 90 days' }
    datasets:
      - name: Orders
        model: orders
        filters:
          - member: orders.created_at
            operator: inDateRange
            value: date-range
            valueType: VARIABLE
    widgets:
      - component: DateRangePickerCustomPro
        position: { x: 0, y: 0 }
        dimensions: { width: 3, height: 7 }     # formula: defaultWidth 300, defaultHeight 120 → 3 × 7
        inputs:
          - input: title
            inputType: string
            valueType: VALUE
            value: Date range
          - input: selectedValue
            inputType: timeRange
            valueType: VARIABLE
            value: date-range
        events:
          - event: onChange
            action: SET_VARIABLE
            config:
              variable: date-range
              sourceType: EVENT_PROPERTY
              sourceValue: value

      - component: BarChartDefaultPro
        position: { x: 0, y: 7 }                # below the date picker (which has height 7)
        dimensions: { width: 12, height: 22 }   # fallback (component meta has no defaultWidth/defaultHeight)
        inputs:
          - input: title
            inputType: string
            valueType: VALUE
            value: Orders by country
          - input: dataset
            inputType: dataset
            valueType: VALUE
            value: Orders
          - input: measures
            inputType: measure
            valueType: VALUE
            array: true
            value:
              - orders.count
            config:
              dataset: dataset
          - input: dimension
            inputType: dimension
            valueType: VALUE
            value: customers.country     # OK because customers is joined to orders
            config:
              dataset: dataset
        events:
          # When a bar is clicked, open `orders-detail-by-country` in a modal.
          # Pre-fill its `country` variable with the clicked country (event property),
          # and propagate this embeddable's `date-range` so the detail view stays in
          # the same time window without the user re-selecting.
          - event: onBarClicked
            action: DRILLDOWN
            config:
              embeddable: orders-detail-by-country
              variableOverrides:
                - variable: country
                  sourceType: EVENT_PROPERTY
                  sourceValue: axisDimensionValue
                - variable: date-range
                  sourceType: VARIABLE
                  sourceValue: date-range

  # ----- Target embeddable: opened in the drill-down modal -----
  - name: orders-detail-by-country
    title: Orders — country detail
    description: Detail view filtered by country (from the click) and date-range (from the parent).
    variables:
      # No defaultValue — the drill-down sets this on open. If someone opens this
      # embeddable directly (no drill), the noFilter rule applies and the country
      # filter is dropped from the dataset query.
      - name: country
        type: string
      - name: date-range
        type: timeRange
        defaultValue: { relativeTimeString: 'Last 90 days' }
    datasets:
      - name: Orders
        model: orders
        filters:
          - member: customers.country
            operator: equals
            value: country
            valueType: VARIABLE
          - member: orders.created_at
            operator: inDateRange
            value: date-range
            valueType: VARIABLE
    widgets:
      - component: BarChartDefaultPro
        position: { x: 0, y: 0 }
        dimensions: { width: 12, height: 22 }   # fallback (component meta has no defaultWidth/defaultHeight)
        inputs:
          - input: title
            inputType: string
            valueType: VALUE
            value: Orders detail
          - input: dataset
            inputType: dataset
            valueType: VALUE
            value: Orders
          - input: measures
            inputType: measure
            valueType: VALUE
            array: true
            value:
              - orders.count
            config:
              dataset: dataset
          - input: dimension
            inputType: dimension
            valueType: VALUE
            value: orders.created_at
            config:
              dataset: dataset
              inputs:
                - input: granularity
                  valueType: VALUE
                  value: day
